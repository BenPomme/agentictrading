# mob.target-state.toml — MobKit mob configuration for AgenticTrading factory
#
# Loaded by the factory's MobkitOrchestratorBackend via:
#   MobKit.builder().mob("config/mob.target-state.toml").gateway(bin).build()
#
# Profile names match _TIER_TO_PROFILE in factory/runtime/mobkit_backend.py:
#   tier1_cheap    → cheap-reviewer
#   tier2_standard → standard-worker
#   tier3_lead     → lead-researcher
#   tier_codegen   → code-author
#   tier_mutate    → code-mutator
#
# All profiles require [profiles.<name>.tools] comms = true so mob meerkats
# can communicate (required for ensure_member() to succeed).
#
# STAGING PHASE: OpenAI-only model mapping.
# Gateway catalog (via handle.models_catalog()) currently exposes:
#   openai:    gpt-5.2 (recommended), gpt-5.2-pro (supported)
#   anthropic: claude-opus-4-6, claude-sonnet-4-6, claude-sonnet-4-5, claude-opus-4-5
#   gemini:    gemini-3-flash-preview, gemini-3-pro-preview
#
# Multi-provider intent preserved for post-staging:
#   cheap-reviewer   → gemini-3-flash-preview  (when GOOGLE_API_KEY validated)
#   lead-researcher  → claude-sonnet-4-6        (when ANTHROPIC_API_KEY validated)

[mob]
id = "agentictrading-factory"

# ---------------------------------------------------------------------------
# Core role profiles — names must match _TIER_TO_PROFILE in mobkit_backend.py
# ---------------------------------------------------------------------------

# tier1_cheap — cheap reviewer / fast critique pass
# external_addressable=true required: production _async_mob_workflow sends
# messages to reviewers via handle.send(); false blocks the RPC gateway.
[profiles.cheap-reviewer]
model = "gpt-5.2"
external_addressable = true

[profiles.cheap-reviewer.tools]
comms = true

# tier2_standard — standard strategy worker
[profiles.standard-worker]
model = "gpt-5.2"
external_addressable = true

[profiles.standard-worker.tools]
comms = true

# tier3_lead — lead analyst; generates theses and synthesises reviewer feedback
# gpt-5.2-pro causes consistent timeouts in mob workflows (gateway event-delivery).
# Using gpt-5.2 (proven stable) until gateway reliability improves.
# Target: gpt-5.2-pro once event delivery is fixed.
[profiles.lead-researcher]
model = "gpt-5.2"
external_addressable = true

[profiles.lead-researcher.tools]
comms = true

# tier_codegen — code generation specialist for strategy model design
[profiles.code-author]
model = "gpt-5.2"
external_addressable = true

[profiles.code-author.tools]
comms = true

# tier_mutate — targeted mutation/tweak worker
# external_addressable=true required: mutate_model._run_single uses
# _async_single_member which calls handle.send() directly.
[profiles.code-mutator]
model = "gpt-5.2"
external_addressable = true

[profiles.code-mutator.tools]
comms = true

# ---------------------------------------------------------------------------
# Extended profiles
# ---------------------------------------------------------------------------

# Deterministic evaluator — no LLM required; profile exists for lifecycle tracking
[profiles.deterministic-evaluator]
model = "gpt-5.2"
external_addressable = false

[profiles.deterministic-evaluator.tools]
comms = true

# ---------------------------------------------------------------------------
# Mob-level defaults — inherited by any profile that does not override them
# ---------------------------------------------------------------------------
[defaults]
max_tokens = 4096
restart_on_failure = true
